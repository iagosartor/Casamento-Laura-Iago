<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Casamento Laura & Iago — Lago di Garda 2028</title>
<style>
:root{
  --glass-bg:rgba(255,255,255,0.28);--glass-strong:rgba(255,255,255,0.44);
  --glass-border:rgba(255,255,255,0.58);--shadow:0 6px 20px rgba(20,40,80,0.18);
  --text:#1a2a4a;--dim:rgba(26,42,74,.68);--faint:rgba(26,42,74,.42);
  --tw:#f0f6ff;--twd:rgba(240,246,255,.82);--twf:rgba(240,246,255,.55);
  --noivo:#2060c8;--noivo-bg:rgba(32,96,200,0.16);
  --noiva:#c05080;--noiva-bg:rgba(192,80,128,0.16);
  --gold:#f5c96a;--eur:#4a90d9;
  --caixa:#0d7a6a;--caixa-bg:rgba(13,122,106,0.14);
  --ok:#0d9a60;--danger:#d44060;--warn:#c07020;
  --R:18px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --fs:-apple-system,BlinkMacSystemFont,Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:var(--f);color:var(--text);background:linear-gradient(145deg,#1a3a6a 0%,#2e5fa0 28%,#4a90c8 55%,#6ab4d8 75%,#a8d8c0 100%) fixed;min-height:100vh;-webkit-font-smoothing:antialiased}
.blob{position:fixed;border-radius:50%;filter:blur(60px);opacity:.38;z-index:0;pointer-events:none}
.blob.b1{width:440px;height:440px;background:#7ab8e8;top:-140px;left:-100px}
.blob.b2{width:380px;height:380px;background:#c8a0d8;bottom:-120px;right:-80px}
.blob.b3{width:300px;height:300px;background:#f0e080;top:40%;right:8%}
.blob.b4{width:260px;height:260px;background:#80d8b8;bottom:20%;left:6%}
.app{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:14px 14px 40px}
.glass{background:var(--glass-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--glass-border);box-shadow:var(--shadow);border-radius:var(--R)}

/* HERO */
header.hero{text-align:center;padding:10px 0 5px}
.hero h1{font-family:var(--fs);font-weight:700;font-size:clamp(24px,5vw,44px);color:var(--tw);text-shadow:0 2px 20px rgba(10,20,50,.5)}
.hero h1 .amp{color:var(--gold);font-style:italic;padding:0 8px}
.hero .sub{color:var(--twd);font-size:13px;margin-top:4px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;margin:11px 0;flex-wrap:wrap}
nav.tabs{display:flex;gap:3px;padding:4px;overflow-x:auto;flex-shrink:0}
nav.tabs button{font-family:var(--f);font-size:12px;font-weight:600;color:var(--dim);background:transparent;border:none;padding:6px 11px;border-radius:999px;cursor:pointer;white-space:nowrap}
nav.tabs button.active{background:var(--glass-strong);color:var(--text);box-shadow:inset 0 0 0 1px var(--glass-border)}
.filters{display:flex;flex-wrap:wrap;gap:4px;padding:4px}
.filters button{font-size:11.5px;font-weight:600;color:var(--dim);background:transparent;border:none;padding:5px 9px;border-radius:999px;cursor:pointer;white-space:nowrap}
.filters button.active{background:var(--glass-strong);color:var(--text);box-shadow:inset 0 0 0 1px var(--glass-border)}
.btn{font-family:var(--f);font-weight:600;font-size:13px;cursor:pointer;border:1px solid var(--glass-border);border-radius:12px;padding:8px 15px;color:var(--text);background:var(--glass-strong);display:inline-flex;align-items:center;gap:6px;transition:transform .15s,background .15s}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.32)}
.btn.primary{background:linear-gradient(135deg,#3a7fd8,#6ab4e8);border-color:transparent;color:#fff}
.btn.danger{color:var(--danger);border-color:rgba(212,64,96,.4);background:rgba(212,64,96,.10)}
.btn.sm{padding:6px 11px;font-size:12px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{padding:14px 16px;min-width:0}
.stat .sl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.stat .sv{font-family:var(--fs);font-weight:700;font-size:clamp(14px,2.8vw,22px);font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:4px;flex-wrap:nowrap}
.stat .sv .pfx{font-size:11px;font-weight:600;opacity:.75;white-space:nowrap;flex-shrink:0}
.stat .sv input{background:transparent;border:none;border-bottom:1.5px dashed rgba(192,112,32,.5);outline:none;font-family:var(--fs);font-size:clamp(14px,2.8vw,22px);font-weight:700;color:inherit;min-width:60px;width:100%;font-variant-numeric:tabular-nums}
.stat.s-caixa .sv input{border-bottom-color:rgba(13,122,106,.5)}
.stat .ss{font-size:10.5px;color:var(--faint);margin-top:4px}
.sv.green{color:var(--ok)}.sv.amber{color:var(--warn)}.sv.teal{color:var(--caixa)}.sv.blue{color:var(--noivo)}

/* EUR BAR */
.eur-bar{background:rgba(74,144,217,.12);border:1px solid rgba(74,144,217,.38);border-radius:12px;padding:7px 15px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px}
.eur-bar input{background:rgba(255,255,255,.55);border:1px solid rgba(74,144,217,.5);border-radius:7px;padding:3px 7px;font-size:12.5px;font-weight:700;color:var(--eur);width:72px;outline:none;font-family:var(--f)}

/* PANELS */
.dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.panel{padding:15px}
.panel h2{font-family:var(--fs);font-weight:600;font-size:18px;margin-bottom:2px}
.panel .psub{color:var(--dim);font-size:11.5px;margin-bottom:11px}
.cline{display:flex;justify-content:space-between;align-items:center;padding:7px 2px;border-bottom:1px solid rgba(255,255,255,.14);font-size:13px}
.cline:last-child{border-bottom:none}
.cline .cv{font-weight:600;font-variant-numeric:tabular-nums}
.cline .cv.green{color:var(--ok)}

/* CONTRATAÇÕES + CHECKLIST FUNDIDOS */
.cc-wrap{display:flex;flex-direction:column;gap:10px}
.cc-header{display:flex;align-items:center;gap:8px;padding:12px 14px;flex-wrap:wrap}
.cc-tabs{display:flex;gap:3px}
.cc-tab{font-size:12.5px;font-weight:600;padding:5px 12px;border-radius:999px;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:background .15s}
.cc-tab.active{background:var(--glass-strong);color:var(--text);box-shadow:inset 0 0 0 1px var(--glass-border)}
/* Tabela contratações */
.tbl{overflow:hidden}
.th,.tr{display:grid;grid-template-columns:2fr 1.4fr 0.5fr 1fr 1fr 1fr 90px;gap:7px;align-items:center;padding:10px 14px}
.th{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;border-bottom:1px solid rgba(255,255,255,.18)}
.th>div{cursor:pointer;user-select:none}
.th>div.sorted{color:var(--gold)}
.tr{border-bottom:1px solid rgba(255,255,255,.12);cursor:pointer;font-size:13px;transition:background .13s}
.tr:last-child{border-bottom:none}
.tr:hover{background:rgba(255,255,255,.13)}
.tr .in{font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:6px}
.tr .su{color:var(--dim);font-size:12px}
.num{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px}
.num.ok{color:var(--ok)}.num.warn{color:var(--warn)}.num.z{color:var(--faint);font-weight:400}
.num .esub{display:block;font-size:9.5px;color:var(--eur)}
.mp{height:4px;border-radius:99px;background:rgba(26,42,74,.14);overflow:hidden;margin-top:3px}
.mp>span{display:block;height:100%;background:linear-gradient(90deg,#0d9a60,#2e80d0)}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-block;white-space:nowrap}
.badge.c{background:rgba(13,154,96,.18);color:var(--ok)}
.badge.p{background:rgba(192,112,32,.16);color:var(--warn)}
.badge.q{background:rgba(32,96,200,.18);color:var(--noivo)}
/* Checklist dentro do CC */
.cl-sec{margin-bottom:10px;overflow:hidden}
.cl-sec-h{font-family:var(--fs);font-weight:600;font-size:16px;padding:12px 14px 9px;border-bottom:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:space-between}
.cl-sec-h .cnt{font-size:11.5px;font-weight:600;color:var(--dim);font-family:var(--f)}
.cl-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.10);cursor:pointer;font-size:13px;transition:background .13s}
.cl-item:last-child{border-bottom:none}
.cl-item:hover{background:rgba(255,255,255,.11)}
.cl-chk{width:19px;height:19px;border-radius:50%;border:2px solid rgba(26,42,74,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;transition:background .14s}
.cl-item.done .cl-chk{background:var(--ok);border-color:var(--ok);color:#fff}
.cl-item.done .cl-lbl{text-decoration:line-through;color:var(--faint)}
.cl-lbl{flex:1}
.pri{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:99px}
.pri.alta{background:rgba(212,64,96,.16);color:var(--danger)}
.pri.media{background:rgba(192,112,32,.14);color:var(--warn)}
.pri.baixa{background:rgba(96,96,160,.14);color:#6060a0}
.cl-fornec{font-size:11px;color:var(--dim);flex:0.8}
.cl-add{padding:11px 14px;border-top:1px solid rgba(255,255,255,.16);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.cl-add input,.cl-add select{font-family:var(--f);font-size:12.5px;background:rgba(255,255,255,.18);border:1px solid var(--glass-border);border-radius:9px;padding:7px 10px;color:var(--text);outline:none}
.cl-add input{flex:1;min-width:140px}
.cl-add input::placeholder{color:var(--faint)}
.cl-add select option{background:#1a3a6a;color:#f0f6ff}
.prog-bar{height:5px;border-radius:99px;background:rgba(26,42,74,.14);overflow:hidden}
.prog-bar>span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#0d9a60,#2e80d0);transition:width .4s}

/* CONVIDADOS */
.g-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.g-stat{padding:12px 10px;text-align:center}
.g-stat .gv{font-family:var(--fs);font-size:22px;font-weight:700;margin-top:3px}
.g-stat .gl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);font-weight:700}
.g-head,.g-row{display:grid;grid-template-columns:0.4fr 2fr 1.4fr 1fr 1fr 80px;gap:7px;align-items:center;padding:9px 14px}
.g-head{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;border-bottom:1px solid rgba(255,255,255,.18)}
.g-row{border-bottom:1px solid rgba(255,255,255,.11);cursor:pointer;font-size:13px;transition:background .13s}
.g-row:last-child{border-bottom:none}
.g-row:hover{background:rgba(255,255,255,.13)}
.g-row .gn{font-weight:600}
.g-row .gc{color:var(--dim);font-size:11.5px}
.gst{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;display:inline-block;white-space:nowrap}
.gst.confirmado{background:rgba(13,154,96,.18);color:var(--ok)}
.gst.pendente{background:rgba(32,96,200,.16);color:var(--noivo)}
.gst.nao-vai{background:rgba(180,180,180,.2);color:var(--faint)}
.gst.reserva-t{background:rgba(192,112,32,.16);color:var(--warn)}
.g-num{font-size:12px;font-weight:600;color:var(--dim)}
.g-add{padding:11px 14px;border-top:1px solid rgba(255,255,255,.16);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.g-add input,.g-add select{font-family:var(--f);font-size:12.5px;background:rgba(255,255,255,.18);border:1px solid var(--glass-border);border-radius:9px;padding:7px 10px;color:var(--text);outline:none}
.g-add input{flex:1;min-width:140px}
.g-add input::placeholder{color:var(--faint)}
.g-add select option{background:#1a3a6a;color:#f0f6ff}

/* O GRANDE DIA */
.gd-hero{text-align:center;padding:24px 20px 18px;background:linear-gradient(135deg,rgba(20,48,100,.6),rgba(100,60,140,.45));border-radius:var(--R);margin-bottom:12px}
.gd-hero h2{font-family:var(--fs);font-size:clamp(20px,5vw,34px);font-weight:700;color:#fff;text-shadow:0 2px 16px rgba(10,20,50,.5);margin-bottom:4px}
.gd-hero .ghs{color:var(--twd);font-size:13px}
.gd-hero .ghd{color:var(--gold);font-size:16px;font-weight:700;margin-top:6px;font-family:var(--fs)}
.gd-tabs{display:flex;gap:4px;padding:4px;margin-bottom:10px}
.gd-tab{font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:999px;border:none;background:transparent;color:var(--dim);cursor:pointer}
.gd-tab.active{background:var(--glass-strong);color:var(--text);box-shadow:inset 0 0 0 1px var(--glass-border)}
.tl-item{display:flex;gap:13px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.12);align-items:flex-start;transition:background .13s}
.tl-item:last-child{border-bottom:none}
.tl-item:hover{background:rgba(255,255,255,.07)}
.tl-time{font-family:var(--fs);font-weight:700;font-size:15px;color:var(--gold);min-width:62px;flex-shrink:0;padding-top:2px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tl-dot.gold{background:var(--gold);box-shadow:0 0 0 3px rgba(245,201,106,.2)}
.tl-dot.rose{background:#f472b6;box-shadow:0 0 0 3px rgba(244,114,182,.2)}
.tl-dot.teal{background:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,.2)}
.tl-dot.blue{background:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.2)}
.tl-dot.violet{background:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.2)}
.tl-tag.rose{background:rgba(244,114,182,.18);color:#f472b6}
.tl-tag.teal{background:rgba(45,212,191,.18);color:#2dd4bf}
.tl-tag.blue{background:rgba(96,165,250,.18);color:#60a5fa}
.tl-tag.violet{background:rgba(167,139,250,.18);color:#a78bfa}
.tl-time.rose{color:#f9a8d4}
.tl-time.teal{color:#5eead4}
.tl-time.blue{color:#93c5fd}
.tl-body{flex:1}
.tl-title{font-weight:700;font-size:14px;color:#f0f6ff;margin-bottom:2px}
.tl-desc{font-size:12px;color:rgba(240,246,255,.7);line-height:1.5}
.tl-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tl-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.13);color:rgba(240,246,255,.85)}
.tl-tag.alt{background:rgba(167,139,250,.2);color:#c4b5fd}
.notes-panel{padding:14px}
.notes-panel h3{font-family:var(--fs);font-size:16px;font-weight:600;margin-bottom:9px}
.notes-area{width:100%;font-family:var(--f);font-size:13px;background:rgba(255,255,255,.18);border:1px solid var(--glass-border);border-radius:11px;padding:10px 12px;color:var(--text);outline:none;resize:vertical;min-height:80px}
.notes-area:focus{border-color:rgba(180,220,255,.9);background:rgba(255,255,255,.26)}
.notes-area::placeholder{color:var(--faint)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(10,20,50,.55);backdrop-filter:blur(4px);opacity:0;pointer-events:none;visibility:hidden;transition:opacity .15s,visibility .15s}
.overlay.open{opacity:1;pointer-events:auto;visibility:visible}
.modal{width:100%;max-width:540px;max-height:88vh;overflow-y:auto;padding:22px;background:rgba(20,48,100,.92);backdrop-filter:blur(18px);border:1px solid var(--glass-border);border-radius:20px;box-shadow:0 20px 60px rgba(10,20,60,.5)}
.mh{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:4px}
.mh h3{font-family:var(--fs);font-weight:700;font-size:21px;color:var(--tw)}
.mh .x{background:rgba(255,255,255,.13);border:none;color:var(--tw);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.mh .x:hover{background:rgba(255,255,255,.24)}
.msub{font-size:11.5px;color:var(--twd);margin-bottom:9px}
.msum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:11px 0}
.msum .cell{padding:10px;border-radius:11px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);text-align:center}
.cell .l{font-size:9.5px;color:var(--twd);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.cell .v{font-family:var(--fs);font-size:17px;font-weight:700;margin-top:3px;color:var(--tw)}
.cell .v.ok{color:#5eead4}.cell .v.warn{color:var(--gold)}
.stitle{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--twd);font-weight:700;margin:13px 0 8px}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--twd);font-weight:600;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-family:var(--f);font-size:13.5px;color:var(--tw);background:rgba(255,255,255,.11);border:1px solid var(--glass-border);border-radius:9px;padding:8px 11px;outline:none}
.field input::placeholder,.field textarea::placeholder{color:var(--twf)}
.field select option{background:#1a3a6a;color:#f0f6ff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.toggle button{font-family:var(--f);font-size:12.5px;font-weight:600;cursor:pointer;padding:8px;border-radius:9px;border:1px solid var(--glass-border);background:rgba(255,255,255,.07);color:var(--twd);transition:background .13s}
.toggle button.sn{background:var(--noivo-bg);color:#90c0ff;border-color:rgba(32,96,200,.5)}
.toggle button.sl{background:var(--noiva-bg);color:#f0a0c0;border-color:rgba(192,80,128,.5)}
.toggle button.sc{background:var(--caixa-bg);color:#5eead4;border-color:rgba(13,122,106,.5)}
.pay-list{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.pay-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13)}
.pay-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.dn{background:#5090e0}.dot.dl{background:#e070a0}.dot.dc{background:#5eead4}
.pay-item .pi{flex:1;min-width:0}
.pay-item .pa{font-weight:700;font-size:13.5px;color:var(--tw)}
.pay-item .pw{font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;margin-left:4px}
.pw.dn{background:var(--noivo-bg);color:#90c0ff}.pw.dl{background:var(--noiva-bg);color:#f0a0c0}.pw.dc{background:var(--caixa-bg);color:#5eead4}
.pay-item .pm{font-size:11px;color:var(--twf);margin-top:1px}
.pay-item .del{background:transparent;border:none;color:var(--twf);cursor:pointer;font-size:16px;padding:2px 5px;border-radius:5px;line-height:1}
.pay-item .del:hover{color:#f08080;background:rgba(220,80,80,.13)}
.addp{padding:11px;border-radius:11px;background:rgba(255,255,255,.06);border:1px dashed var(--glass-border);margin-top:7px}
.mact{display:flex;gap:7px;margin-top:14px}
.mact .btn{flex:1;justify-content:center}
.eur-note{font-size:10.5px;color:var(--eur);font-weight:600;margin-top:3px}
.saved-toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(13,154,96,.95);color:#fff;font-size:12.5px;font-weight:600;padding:7px 17px;border-radius:99px;box-shadow:0 8px 24px rgba(13,154,96,.35);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:100}
.saved-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DASHBOARD NOVO */
.dash-hero{text-align:center;padding:24px 20px 20px;margin-bottom:14px;background:linear-gradient(135deg,rgba(20,48,100,.55),rgba(60,100,180,.35));border-radius:var(--R)}
.dash-cd-val{font-family:var(--fs);font-size:clamp(34px,7vw,58px);font-weight:700;color:var(--tw);line-height:1.15;text-shadow:0 2px 24px rgba(10,20,50,.5);letter-spacing:-0.5px}
.dash-cd-val .unit{font-size:.38em;font-weight:500;opacity:.75;margin-left:2px;letter-spacing:0}

function totals(){
  var paid=0,dueC=0,orc=0,noivo=0,noiva=0,cxUso=0,nCnt=0,lCnt=0,cCnt=0;
  state.contracts.forEach(function(c){
    var tB=cBRL(c),p=paidOf(c);
    orc+=tB;paid+=p;
    if(c.status!=='previsto')dueC+=dueOf(c);
    (c.payments||[]).forEach(function(py){
      var a=pBRL(py);
      if(py.paidBy==='Noiva'){noiva+=a;lCnt++;}
      else if(py.paidBy==='Caixa'){cxUso+=a;cCnt++;}
      else{noivo+=a;nCnt++;}
    });
  });
  var cxT=(state.caixa.contributions||[]).reduce(function(s,c){return s+(c.amount||0);},0);
  return{paid:paid,dueC:dueC,orc:orc,noivo:noivo,noiva:noiva,nCnt:nCnt,lCnt:lCnt,
    cxUso:cxUso,cxT:cxT,cxDisp:cxT-cxUso,
    prog:orc>0?Math.min(100,(paid/orc)*100):0};
}
function countdown(){
  var now=new Date(),t=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var td=Math.round((WEDDING-t)/86400000);
  if(td<=0)return{main:'<span style="color:var(--gold)">💕</span>',days:'',done:true};
  var mo=(WEDDING.getFullYear()-t.getFullYear())*12+(WEDDING.getMonth()-t.getMonth());
  var anc=new Date(t.getFullYear(),t.getMonth()+mo,t.getDate());
  if(anc>WEDDING){mo--;anc=new Date(t.getFullYear(),t.getMonth()+mo,t.getDate());}
  var dias=Math.round((WEDDING-anc)/86400000);
  var main='<span style="color:var(--gold)">'+mo+'</span><span class="unit"> meses</span>'
          +'<span class="unit" style="color:rgba(240,246,255,.7);font-size:.5em;margin:0 4px">e</span>'
          +'<span style="color:var(--gold)">'+dias+'</span><span class="unit"> dias</span>';
  var days='<span style="color:var(--gold);font-weight:700">'+td+'</span> dias no total';
  return{main:main,days:days,done:false};
}

// Helper para timeline — retorna string HTML
function renderTLItem(item){
  var dotCls='tl-dot '+(item.dot||'gold');
  var timeCls='tl-time'+(item.tc?' '+item.tc:'');
  var tagCls=item.dot||'';
  var s='<div class="tl-item"><div class="'+timeCls+'">'+item.t+'</div><div class="'+dotCls+'"></div><div class="tl-body">';
  s+='<div class="tl-title">'+item.title+'</div>';
  if(item.desc)s+='<div class="tl-desc">'+item.desc+'</div>';
  s+='<div class="tl-tags">';
  item.tags.forEach(function(tg){s+='<span class="tl-tag'+(tagCls?' '+tagCls:'')+'">'+tg+'</span>';});
  s+='</div></div></div>';
  return s;
}


// ── RENDER PRINCIPAL ──
function render(){
  ['dashboard','cc','convidados','grandia'].forEach(function(v){
    var el=document.getElementById('sec-'+v);
    if(el)el.style.display=curView===v?'':'none';
  });
  document.querySelectorAll('nav.tabs button[data-view]').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-view')===curView);
  });
  var fb=document.getElementById('filtersBar');
  if(fb)fb.style.display='none';
  var bn=document.getElementById('btnNew');
  if(bn)bn.style.display='none'; // handled inside cc
  if(curView==='dashboard')renderDash();
  else if(curView==='cc')renderCC();
  else if(curView==='convidados')renderConvidados();
  else if(curView==='grandia')renderGrandia();
}

// ── MODAIS ──
function showModal(h){
  var m=document.getElementById('modal');
  m.innerHTML=h;document.getElementById('overlay').classList.add('open');m.scrollTop=0;
  m.querySelectorAll('[data-close]').forEach(function(b){b.addEventListener('click',closeModal);});
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  if(viewDirty){viewDirty=false;render();}
}

   ['Banda','EUR','italia'],['Wedding Planner local','EUR','italia'],
   ['Vestido de Noiva','BRL','brasil'],['Alianças','BRL','brasil'],
   ['Traje do Noivo','BRL','brasil'],['Passagens Aéreas','BRL','brasil'],
   ['Tradutora juramentada','BRL','brasil'],['Convites e Papelaria','BRL','brasil']
  ].forEach(function(it){state.contracts.push({id:uid(),item:it[0],supplier:'A definir',total:0,currency:it[1],origin:it[2],status:'previsto',notes:'',payments:[]});});
  save();
}

// ── INIT ──
function init(){
  if(!load()){state={contracts:[],caixa:{contributions:[]},checklist:defCL(),guests:defGuests(),orcamentoMeta:0,grandiaNotas:'',preWedNotas:'',notaQuinta:'',notaSabado:'',notaManha:''};save();}
  norm();
  // Tabs
  document.querySelector('nav.tabs').addEventListener('click',function(e){
    var b=e.target.closest('[data-view]');if(b){curView=b.getAttribute('data-view');render();}
  });
  // Filters
  document.getElementById('filtersBar').addEventListener('click',function(e){
    var b=e.target.closest('[data-filter]');
    if(b){curFlt=b.getAttribute('data-filter');document.querySelectorAll('[data-filter]').forEach(function(x){x.classList.toggle('active',x.getAttribute('data-filter')===curFlt);});renderCC();}
  });
  // Topbar
  document.getElementById('btnBlur').addEventListener('click',function(){blurMoney=!blurMoney;document.body.classList.toggle('blur-money',blurMoney);});
  // Dashboard delegation
  document.getElementById('sec-dashboard').addEventListener('click',function(e){
    if(e.target.id==='btnCaixa')openCaixa();
    if(e.target.id==='btnGoCC'){curView='cc';render();}
  });
  document.getElementById('sec-dashboard').addEventListener('change',function(e){
    if(e.target.id==='eurIn'){var v=parseFloat(e.target.value.replace(',','.'));if(v>0){eurRate=v;renderDash();}}
    else if(e.target.id==='orcIn'){
      var raw=e.target.value.replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.');
      var v=parseFloat(raw);if(!isNaN(v)&&v>=0){state.orcamentoMeta=v;save();renderDash();}
    }
    else if(e.target.id==='cxIn'){
      var raw=e.target.value.replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.');
      var v=parseFloat(raw);
      if(!isNaN(v)&&v>=0){
        var atT=state.caixa.contributions.reduce(function(s,c){return s+(c.amount||0);},0);
        var diff=v-atT;
        if(Math.abs(diff)>0.01){state.caixa.contributions.push({id:uid(),source:'Ajuste rápido',amount:diff,date:todayISO(),note:'Editado no painel'});save();renderDash();}
      }
    }
  });
  // CC delegation — handler limpo, ordem correta (específico→geral)
  document.getElementById('sec-cc').addEventListener('click',function(e){
    var t=e.target;

    // 1. Filtros de topo
    var pf=t.closest('[data-plflt]');
    if(pf){
      plFlt=pf.getAttribute('data-plflt');
      document.querySelectorAll('[data-plflt]').forEach(function(x){x.classList.toggle('active',x.getAttribute('data-plflt')===plFlt);});
      renderCC();return;
    }

    // 2. Nova contratação
    if(t.id==='btnNewContract'){openNew();return;}

    // 3. Salvar contrato inline — ANTES do expand para não conflitar
    var saveBtn=t.closest('[data-plsave]');
    if(saveBtn){
      var iid=saveBtn.getAttribute('data-plsave');
      var item=state.checklist.find(function(i){return i.id===iid;});
      if(!item)return;
      var supp=document.getElementById('pci-supp-'+iid).value.trim();
      var orig=document.getElementById('pci-orig-'+iid).value;
      var cur=document.getElementById('pci-cur-'+iid).value;
      var val=pm(document.getElementById('pci-val-'+iid).value);
      var st=document.getElementById('pci-st-'+iid).value;
      var notes=document.getElementById('pci-notes-'+iid).value.trim();
      if(item.contractId){
        var contr=state.contracts.find(function(x){return x.id===item.contractId;});
        if(contr){contr.supplier=supp||'A definir';contr.origin=orig;contr.currency=cur;contr.total=val;contr.status=st;contr.notes=notes;contr.item=item.label;}
      }else{
        var nc={id:uid(),item:item.label,supplier:supp||'A definir',total:val,currency:cur,origin:orig,status:st,notes:notes,payments:[]};
        state.contracts.push(nc);item.contractId=nc.id;
      }
      item.fornecedor=supp;save();renderCC();return;
    }

    // 4. Ver pagamentos
    var openBtn=t.closest('[data-plopen]');
    if(openBtn){
      var iid=openBtn.getAttribute('data-plopen');
      var item=state.checklist.find(function(i){return i.id===iid;});
      if(item&&item.contractId)openDetail(item.contractId);
      return;
    }

    // 5. Remover contrato
    var delBtn=t.closest('[data-pldel]');
    if(delBtn){
      var iid=delBtn.getAttribute('data-pldel');
      var item=state.checklist.find(function(i){return i.id===iid;});
      if(item&&confirm('Remover contrato deste item?')){
        state.contracts=state.contracts.filter(function(x){return x.id!==item.contractId;});
        item.contractId=null;item.fornecedor='';expandedId=null;save();renderCC();
      }return;
    }

    // 6. Expand/colapsar painel de contrato
    var expBtn=t.closest('[data-expand]');
    if(expBtn){
      var eid=expBtn.getAttribute('data-expand');
      expandedId=expandedId===eid?null:eid;
      renderCC();return;
    }

    // 7. Adicionar tarefa nova na seção
    var addBtn=t.closest('.cl-add-btn');
    if(addBtn){
      var row=addBtn.closest('.cl-add');
      var secKey=row.getAttribute('data-seckey');
      var lbl=row.querySelector('.cl-new-lbl').value.trim();
      var pri=row.querySelector('.cl-new-pri').value;
      if(!lbl)return;
      var sec=null;
      state.checklist.forEach(function(i){
        if(!sec){try{if(btoa(unescape(encodeURIComponent(i.section))).slice(0,20)===secKey)sec=i.section;}catch(ex){}}
      });
      if(!sec)sec='Outros';
      state.checklist.push({id:uid(),section:sec,label:lbl,done:false,contractId:null,fornecedor:'',priority:pri});
      save();renderCC();return;
    }

    // 8. Toggle done — ÚLTIMO, só atinge a linha (não botões)
    // Se chegou aqui sem ter clicado em nenhum botão acima,
    // e clicou dentro de uma .pl-row, toggle done
    var plRow=t.closest('.pl-row');
    if(plRow){
      var plItem=plRow.closest('.pl-item[data-plid]');
      if(plItem){
        var pid=plItem.getAttribute('data-plid');
        var found=state.checklist.find(function(i){return i.id===pid;});
        if(found){found.done=!found.done;save();renderCC();}
      }return;
    }
  });
  // Convidados delegation
  document.getElementById('sec-convidados').addEventListener('click',function(e){
    var gf=e.target.closest('[data-gflt]');
    if(gf){
      guestFlt=gf.getAttribute('data-gflt');
      // Ao trocar filtro de aba, não limpa a busca — permite combinar
      renderConvidados();return;
    }
    if(e.target.id==='btnNewGuest'){openGuest(null);return;}
    if(e.target.id==='gAdd'){
      var n=document.getElementById('gNome').value.trim();if(!n)return;
      var cat=document.getElementById('gCat').value;
      var tp=cat==='Lista Reserva'?'reserva':'convidado';
      var prob=document.getElementById('gProb').value;
      var status=prob==='certeza'?'confirmado':'pendente';
      state.guests.push({id:uid(),nome:n,categoria:cat,prob:prob,tipo:tp,status:status,obs:''});
      save();renderConvidados();return;
    }
    var gr=e.target.closest('.g-row[data-gid]');if(gr)openGuest(gr.getAttribute('data-gid'));
  });
  // Grande Dia delegation
  document.getElementById('sec-grandia').addEventListener('click',function(e){
    var gt=e.target.closest('[data-gdtab]');if(gt){gdTab=gt.getAttribute('data-gdtab');renderGrandia();}
  });
  // Overlay + ESC
  document.getElementById('overlay').addEventListener('click',function(e){if(e.target.id==='overlay')closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  render();
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
</body>
</html>
